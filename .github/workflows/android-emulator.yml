name: Android Emulator Web Control

on:
  workflow_dispatch:
    inputs:
      api_level:
        description: 'Android API Level'
        required: true
        default: '33'
        type: choice
        options: ['30', '31', '32', '33', '34']
      device_profile:
        description: 'Device Profile'
        required: true
        default: 'pixel_6'
        type: choice
        options: ['pixel_4', 'pixel_6', 'pixel_7', 'Nexus 5X']
      session_duration:
        description: 'Session duration (minutes)'
        required: true
        default: '30'
        type: string

env:
  NGROK_VERSION: '3.6.0'
  NOVNC_PORT: 6080
  VNC_PORT: 5900
  ADB_PORT: 5037
  BACKEND_PORT: 3001

jobs:
  run-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android SDK tools to PATH
        run: |
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> $GITHUB_ENV

      # Cache key bumped to "-v2" and system-images/platforms added to the
      # cached paths. This makes restored caches actually contain the SDK
      # binaries, not just the AVD config files.
      - name: Cache AVD & SDK packages
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            ${{ env.ANDROID_HOME }}/system-images
            ${{ env.ANDROID_HOME }}/platforms
          key: avd-api${{ github.event.inputs.api_level }}-${{ github.event.inputs.device_profile }}-v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            x11vnc xvfb \
            xfce4 xfce4-terminal \
            git curl wget unzip \
            python3 python3-pip \
            net-tools netcat-openbsd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install --omit=dev

      - name: Install ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          if [ -z "$NGROK_AUTH_TOKEN" ]; then
            echo "::error::NGROK_AUTH_TOKEN secret is missing - add it in Settings > Secrets and variables > Actions"
            exit 1
          fi

          curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz
          sudo mv ngrok /usr/local/bin/ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN"

      - name: Install noVNC
        run: |
          git clone --depth=1 https://github.com/novnc/noVNC.git /opt/noVNC
          git clone --depth=1 https://github.com/novnc/websockify.git /opt/noVNC/utils/websockify

      - name: Create and start virtual display
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x800x24 -ac +extension GLX +render -noreset &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      - name: Start XFCE desktop
        run: |
          DISPLAY=:99 startxfce4 &
          sleep 3

      - name: Start VNC server
        run: |
          x11vnc \
            -display :99 \
            -forever \
            -nopw \
            -shared \
            -bg \
            -rfbport ${{ env.VNC_PORT }} \
            -o /tmp/x11vnc.log
          sleep 2

      - name: Start noVNC web server
        run: |
          /opt/noVNC/utils/novnc_proxy \
            --vnc localhost:${{ env.VNC_PORT }} \
            --listen ${{ env.NOVNC_PORT }} \
            --web /opt/noVNC \
            &
          sleep 2

      # ============================================================
      # FIX #1 — "FATAL | Broken AVD system path"
      # ------------------------------------------------------------
      # The original workflow only ran sdkmanager to install the
      # system image INSIDE the "AVD doesn't exist yet" branch. On a
      # cache-hit run, prod_emulator.ini gets restored from cache, so
      # that whole branch (including the sdkmanager install) was
      # skipped — but the actual system-image binaries were never
      # guaranteed to be present. Result: the AVD pointed at a system
      # image folder that didn't exist -> emulator crashed instantly.
      #
      # sdkmanager is idempotent (it skips anything already
      # installed), so we now always run it, on every single run,
      # regardless of whether the AVD itself is cached.
      # ============================================================
      - name: Install required SDK packages (always, idempotent)
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "system-images;android-${{ github.event.inputs.api_level }};google_apis;x86_64" \
            "platforms;android-${{ github.event.inputs.api_level }}" \
            "platform-tools" \
            "emulator"

      - name: Create AVD if not exists
        run: |
          mkdir -p "$ANDROID_AVD_HOME"
          if [ -f "$ANDROID_AVD_HOME/prod_emulator.ini" ]; then
            echo "AVD 'prod_emulator' already exists - skipping creation."
          else
            echo "AVD not found, creating now..."
            echo "no" | avdmanager create avd \
              -n "prod_emulator" \
              -k "system-images;android-${{ github.event.inputs.api_level }};google_apis;x86_64" \
              -d "${{ github.event.inputs.device_profile }}" \
              --force
            echo "avdmanager exit code: $?"
            echo "--- avdmanager list avd ---"
            avdmanager list avd

            if [ ! -f "$ANDROID_AVD_HOME/prod_emulator.ini" ]; then
              echo "::error::avdmanager ran but prod_emulator.ini was not created - see listing below"
              ls -la "$ANDROID_AVD_HOME" 2>&1 || echo "(directory does not exist)"
              find / -name "prod_emulator.ini" 2>/dev/null
              exit 1
            fi
          fi

      - name: Configure emulator settings
        run: |
          mkdir -p "$ANDROID_AVD_HOME/prod_emulator.avd"
          if grep -q "^hw.gpu.enabled=" "$ANDROID_AVD_HOME/prod_emulator.avd/config.ini" 2>/dev/null; then
            echo "Custom emulator settings already present - skipping."
          else
            cat >> "$ANDROID_AVD_HOME/prod_emulator.avd/config.ini" << EOF
          hw.gpu.enabled=yes
          hw.gpu.mode=swiftshader_indirect
          hw.ramSize=2048
          disk.dataPartition.size=4096M
          hw.keyboard=yes
          hw.mainKeys=no
          EOF
          fi

      - name: Start Android emulator
        run: |
          DISPLAY=:99 emulator \
            -avd prod_emulator \
            -gpu swiftshader_indirect \
            -no-audio \
            -no-snapshot-save \
            -memory 2048 \
            -cores 2 \
            &
          EMULATOR_PID=$!
          sleep 5

          if ! kill -0 "$EMULATOR_PID" 2>/dev/null; then
            echo "::error::emulator process immediately exited/crashed. Check PATH (which emulator)."
            exit 1
          fi

          echo "Waiting for emulator to boot..."
          if ! timeout 60 adb wait-for-device; then
            echo "::error::adb did not detect a device within 60s. Emulator may have crashed."
            exit 1
          fi

          timeout 300 bash -c '
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
              echo "Waiting for boot..."
              sleep 5
            done
          '
          echo "Emulator booted successfully!"

      - name: Start backend API server
        run: |
          cd backend
          NODE_ENV=production \
          ADB_PATH=$(which adb) \
          SESSION_DURATION=${{ github.event.inputs.session_duration }} \
          PORT=${{ env.BACKEND_PORT }} \
          node server.js &
          sleep 2

      # ============================================================
      # FIX #2 — noVNC URL printed as "/vnc.html" with no domain
      # ------------------------------------------------------------
      # The original workflow launched TWO separate `ngrok http`
      # processes. Every ngrok agent process binds its local
      # inspection API to 127.0.0.1:4040 by default. The SECOND
      # process can't bind that same port, so only ONE of the two
      # tunnels ever showed up in `curl localhost:4040/api/tunnels` —
      # which is exactly why one URL (the backend) printed fine and
      # the other (noVNC) came back empty.
      #
      # Fix: define BOTH tunnels in a single ngrok config file and
      # start them with ONE agent process (`ngrok start --all`).
      # Both tunnels then show up together under the same :4040 API.
      # ============================================================
      - name: Configure ngrok tunnels (single agent session)
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          mkdir -p ~/.config/ngrok
          cat > ~/.config/ngrok/ngrok.yml << EOF
          version: "3"
          agent:
            authtoken: ${NGROK_AUTH_TOKEN}
          tunnels:
            novnc:
              proto: http
              addr: ${{ env.NOVNC_PORT }}
            backend:
              proto: http
              addr: ${{ env.BACKEND_PORT }}
          EOF

      - name: Start ngrok tunnels
        run: |
          ngrok start --all \
            --config ~/.config/ngrok/ngrok.yml \
            --log=stdout --log-format=json \
            > /tmp/ngrok.log 2>&1 &
          sleep 6

          if ! curl -s http://localhost:4040/api/tunnels > /dev/null; then
            echo "::error::ngrok did not start - dumping log"
            cat /tmp/ngrok.log
            exit 1
          fi

      - name: Get and display tunnel URLs
        run: |
          curl -s http://localhost:4040/api/tunnels > /tmp/tunnels.json

          NOVNC_URL=$(python3 -c "
          import json
          t = json.load(open('/tmp/tunnels.json'))['tunnels']
          for tunnel in t:
              if tunnel.get('name') == 'novnc':
                  print(tunnel['public_url'])
                  break
          ")

          API_URL=$(python3 -c "
          import json
          t = json.load(open('/tmp/tunnels.json'))['tunnels']
          for tunnel in t:
              if tunnel.get('name') == 'backend':
                  print(tunnel['public_url'])
                  break
          ")

          if [ -z "$NOVNC_URL" ] || [ -z "$API_URL" ]; then
            echo "::error::Could not resolve one or both tunnel URLs - raw ngrok response below:"
            cat /tmp/tunnels.json
            exit 1
          fi

          {
            echo "## Android Emulator Session Ready"
            echo ""
            echo "| Service | URL |"
            echo "|---|---|"
            echo "| Web UI (noVNC) | $NOVNC_URL/vnc.html |"
            echo "| Backend API | $API_URL |"
            echo ""
            echo "_Note: ngrok's free plan shows a one-time browser warning page._"
            echo "_Click **Visit Site** to continue the first time you open the noVNC link._"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "========================================"
          echo "   ANDROID EMULATOR SESSION READY!"
          echo "========================================"
          echo "  Web UI (noVNC):  $NOVNC_URL/vnc.html"
          echo "  Backend API:     $API_URL"
          echo "========================================"

      - name: Keep session alive
        run: |
          DURATION_SECS=$(( ${{ github.event.inputs.session_duration }} * 60 ))
          END_TIME=$(($(date +%s) + DURATION_SECS))
          while [ $(date +%s) -lt $END_TIME ]; do
            REMAINING=$(( END_TIME - $(date +%s) ))
            echo "Remaining: ${REMAINING}s | Boot: $(adb shell getprop sys.boot_completed 2>/dev/null)"
            sleep 30
          done

      - name: Cleanup
        if: always()
        run: |
          pkill -f emulator || true
          pkill -f ngrok || true
          pkill -f novnc_proxy || true
          pkill -f x11vnc || true
          pkill -f Xvfb || true
